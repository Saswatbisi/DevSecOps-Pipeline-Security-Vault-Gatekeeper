apiVersion: v1
kind: Pod
metadata:
  name: test-pod-no-limits
spec:
  containers:
    - name: nginx
      image: nginx:alpine
---
apiVersion: v1
kind: Pod
metadata:
  name: test-pod-with-limits
spec:
  containers:
    - name: nginx
      image: nginx:alpine
      resources:
        limits:
          cpu: "200m"
          memory: "256Mi"
        requests:
          cpu: "100m"
          memory: "128Mi"
